<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro | MiCarga.mx</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:#edf2f7;

}

header{

    background:#0a3d62;
    color:white;
    padding:18px 40px;
    font-size:24px;
    font-weight:bold;

}

.container{

    width:100%;
    display:flex;
    justify-content:center;
    margin-top:50px;

}

.card{

    background:white;
    width:700px;
    border-radius:10px;
    box-shadow:0px 10px 25px rgba(0,0,0,.15);
    padding:35px;

}

h2{

    text-align:center;
    color:#0a3d62;
    margin-bottom:30px;

}

.tipoUsuario{

    display:flex;
    justify-content:space-between;
    margin-bottom:25px;

}

.tipoUsuario label{

    width:32%;
    border:2px solid #ddd;
    border-radius:8px;
    padding:15px;
    cursor:pointer;
    text-align:center;
    transition:.3s;

}

.tipoUsuario label:hover{

    border-color:#1e90ff;

}

input[type=radio]{

    margin-bottom:10px;

}

.grid{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;

}

.campo{

    display:flex;
    flex-direction:column;

}

.campo label{

    margin-bottom:6px;
    font-weight:bold;

}

.campo input,
.campo select{

    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;

}

.full{

    grid-column:1/3;

}

button{

    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    background:#0a3d62;
    color:white;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;

}

button:hover{

    background:#14568a;

}

.login{

    margin-top:25px;
    text-align:center;

}

.login a{

    color:#0a3d62;
    text-decoration:none;
    font-weight:bold;

}

</style>

</head>

<body>

<header>

MiCarga.mx

</header>

<div class="container">

<div class="card">

<h2>Crear una cuenta</h2>

<div class="tipoUsuario">

<label>

<input type="radio" name="tipo" checked>

<br>

🏢

<h3>Empresa</h3>

<p>Necesito transporte</p>

</label>

<label>

<input type="radio" name="tipo">

<br>

🚛

<h3>Transportista</h3>

<p>Tengo unidades</p>

</label>

<label>

<input type="radio" name="tipo">

<br>

👨‍✈️

<h3>Operador</h3>

<p>Busco trabajo</p>

</label>

</div>

<form>

<div class="grid">

<div class="campo">

<label>Nombre o Empresa</label>

<input type="text">

</div>

<div class="campo">

<label>RFC</label>

<input type="text">

</div>

<div class="campo">

<label>Correo electrónico</label>

<input type="email">

</div>

<div class="campo">

<label>Teléfono</label>

<input type="tel">

</div>

<div class="campo">

<label>Estado</label>

<select>

<option>Baja California</option>

<option>Sonora</option>

<option>Jalisco</option>

<option>Nuevo León</option>

<option>CDMX</option>

</select>

</div>

<div class="campo">

<label>Ciudad</label>

<input type="text">

</div>

<div class="campo full">

<label>Contraseña</label>

<input type="password">

</div>

<div class="campo full">

<label>Confirmar contraseña</label>

<input type="password">

</div>

</div>

<button>

Crear cuenta

</button>

</form>

<div class="login">

¿Ya tienes cuenta?

<a href="login.html">

Iniciar sesión

</a>

</div>

</div>

</div>

</body>

</html>
